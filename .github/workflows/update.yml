name: Fetch V2Ray Configs

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    permissions:
      contents: write

    env:
      PYTHONUNBUFFERED: "1"
      # Force Node.js 24 for all JS-based actions (eliminates Node20 deprecation warning)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4.2.2
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python fetch_configs.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add config.txt

          # Nothing changed → skip commit entirely
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi

          git commit -m "🔄 auto-update configs"

          # Push — if rejected (race condition), rebase with our version winning
          git push origin main || {
            echo "Push rejected — rebasing..."
            git fetch origin main
            git rebase -X theirs origin/main
            git push origin main
          }
