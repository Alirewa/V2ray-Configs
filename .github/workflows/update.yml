name: Fetch V2Ray Configs

on:
  push:
    branches:
      - main
  schedule:
    # هر ۱۵ دقیقه یک بار اجرا می‌شود
    - cron: "*/15 * * * *"
  workflow_dispatch: # امکان اجرای دستی از GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python fetch_configs.py

      - name: Commit and push updated configs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 auto-update configs [$(date +'%Y-%m-%d %H:%M')]"
          file_pattern: config.txt
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
